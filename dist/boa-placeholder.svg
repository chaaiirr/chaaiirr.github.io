<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#1A1A18"/>
  <!-- Robot body -->
  <rect x="155" y="120" width="90" height="80" rx="8" fill="none" stroke="#F0EFE8" stroke-width="2.5"/>
  <!-- Robot head -->
  <rect x="165" y="88" width="70" height="55" rx="6" fill="none" stroke="#F0EFE8" stroke-width="2.5"/>
  <!-- Eyes -->
  <circle cx="185" cy="110" r="8" fill="none" stroke="#C3E41D" stroke-width="2"/>
  <circle cx="185" cy="110" r="3" fill="#C3E41D"/>
  <circle cx="215" cy="110" r="8" fill="none" stroke="#C3E41D" stroke-width="2"/>
  <circle cx="215" cy="110" r="3" fill="#C3E41D"/>
  <!-- Antenna -->
  <line x1="200" y1="88" x2="200" y2="70" stroke="#F0EFE8" stroke-width="2"/>
  <circle cx="200" cy="66" r="5" fill="#C4573A"/>
  <!-- Arms -->
  <line x1="155" y1="140" x2="130" y2="155" stroke="#F0EFE8" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="126" cy="158" r="7" fill="none" stroke="#F0EFE8" stroke-width="2"/>
  <line x1="245" y1="140" x2="270" y2="155" stroke="#F0EFE8" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="274" cy="158" r="7" fill="none" stroke="#F0EFE8" stroke-width="2"/>
  <!-- Legs -->
  <line x1="175" y1="200" x2="175" y2="225" stroke="#F0EFE8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="225" y1="200" x2="225" y2="225" stroke="#F0EFE8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="162" y1="225" x2="188" y2="225" stroke="#F0EFE8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="212" y1="225" x2="238" y2="225" stroke="#F0EFE8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Spray nozzle on chest -->
  <rect x="188" y="148" width="24" height="14" rx="4" fill="none" stroke="#C3E41D" stroke-width="1.5"/>
  <line x1="200" y1="162" x2="200" y2="172" stroke="#C3E41D" stroke-width="1.5"/>
  <!-- Label -->
  <text x="200" y="258" font-family="Arial, sans-serif" font-size="10" letter-spacing="3" fill="#666660" text-anchor="middle" text-transform="uppercase">PROJECT BOA</text>
</svg>
